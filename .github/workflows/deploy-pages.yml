name: Deploy PWA Demo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prüfen, ob statische Demo möglich ist
        run: |
          echo "Die App nutzt einen Express-Server mit Schreibzugriff auf /data."
          echo "Auf GitHub Pages wird daher nur eine statische Demo ohne Backend-Funktionen deployed."

      - name: Build static Pages artifact
        run: |
          rm -rf dist
          mkdir -p dist/vendor/chart
          cp -R public/. dist/
          cp node_modules/chart.js/dist/chart.umd.js dist/vendor/chart/chart.umd.js
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
